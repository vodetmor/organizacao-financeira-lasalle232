<script>
(function () {
  'use strict';

  const fmtBRL = (n) => 'R$ ' + (Number(n) || 0).toLocaleString('pt-BR', {
    minimumFractionDigits: 2, maximumFractionDigits: 2
  });

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  // Cores para os charts (alinhadas aos tokens CSS)
  const PALETA_ENTRADA = ['#15803D', '#22C55E', '#4ADE80', '#86EFAC', '#BBF7D0', '#16A34A'];
  const PALETA_SAIDA   = ['#EF4444', '#F87171', '#FCA5A5', '#FECACA', '#DC2626', '#B91C1C'];

  let chartEntradas = null;
  let chartSaidas = null;
  let filtroAtual = 'todos';
  let dadosAtuais = null;

  function countUp(el, finalValue, duration) {
    const start = 0;
    const startTime = performance.now();
    const isCurrency = el.dataset.fmt !== 'pct';
    function step(now) {
      const t = Math.min(1, (now - startTime) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      const v = start + (finalValue - start) * eased;
      el.textContent = isCurrency ? fmtBRL(v) : Math.round(v) + '%';
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function showToast(msg, tipo) {
    const t = $('#toast');
    t.textContent = msg;
    t.className = 'toast toast--show' + (tipo ? ' toast--' + tipo : '');
    setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  function renderWarnings(warnings, erro) {
    const box = $('#warnings');
    box.innerHTML = '';
    if (erro) {
      box.innerHTML = '<div class="banner banner--erro">' +
        '<button class="banner__close" onclick="this.parentElement.remove()">&times;</button>' +
        '⚠️ ' + escapeHtml(erro) + '</div>';
      return;
    }
    if (!warnings || warnings.length === 0) return;
    box.innerHTML = '<div class="banner">' +
      '<button class="banner__close" onclick="this.parentElement.remove()">&times;</button>' +
      '⚠ ' + warnings.map(escapeHtml).join(' · ') + '</div>';
  }

  function renderMeta(resumo) {
    countUp($('#meta-saldo'), resumo.saldo, 800);
    $('#meta-valor').textContent = fmtBRL(resumo.meta);

    const pctClamped = Math.max(0, Math.min(100, resumo.percentual));
    setTimeout(() => { $('#meta-fill').style.width = pctClamped + '%'; }, 100);

    const pctEl = $('#meta-pct');
    pctEl.dataset.fmt = 'pct';
    countUp(pctEl, Math.round(resumo.percentual), 800);
    if (resumo.percentual >= 100) pctEl.classList.add('meta__pct--cheio');
    if (resumo.saldo < 0) pctEl.classList.add('meta__pct--alerta');

    $('#meta-falta').textContent = resumo.falta > 0
      ? 'faltam ' + fmtBRL(resumo.falta)
      : '🎉 meta atingida';
  }

  function renderCards(resumo) {
    countUp($('#card-arrecadado'), resumo.arrecadado, 800);
    countUp($('#card-gasto'),       resumo.gasto,       800);
    countUp($('#card-saldo'),       resumo.saldo,       800);
    countUp($('#card-falta'),       resumo.falta,       800);
  }

  function renderCharts(entradas, saidas) {
    renderChart('chart-entradas', 'wrap-entradas', entradas, PALETA_ENTRADA, chartEntradas, (c) => { chartEntradas = c; });
    renderChart('chart-saidas',   'wrap-saidas',   saidas,   PALETA_SAIDA,   chartSaidas,   (c) => { chartSaidas = c; });
  }

  function renderChart(canvasId, wrapId, dados, paleta, existente, setRef) {
    const wrap = $('#' + wrapId);
    if (!dados || dados.length === 0) {
      wrap.innerHTML = '<div class="chart-vazio">Nenhum lançamento ainda.</div>';
      return;
    }
    if (!wrap.querySelector('canvas')) {
      wrap.innerHTML = '<canvas id="' + canvasId + '"></canvas>';
    }
    if (existente) existente.destroy();
    const ctx = $('#' + canvasId).getContext('2d');
    const chart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: dados.map(d => d.categoria),
        datasets: [{
          data: dados.map(d => d.total),
          backgroundColor: dados.map((_, i) => paleta[i % paleta.length]),
          borderWidth: 0,
          hoverOffset: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '62%',
        animation: { duration: 800, easing: 'easeOutQuart' },
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              padding: 12,
              boxWidth: 10,
              boxHeight: 10,
              font: { family: 'Inter', size: 12, weight: '500' },
              color: '#475569'
            }
          },
          tooltip: {
            callbacks: { label: (ctx) => ctx.label + ': ' + fmtBRL(ctx.parsed) },
            backgroundColor: '#0F172A',
            padding: 10,
            cornerRadius: 8,
            titleFont: { family: 'Inter' },
            bodyFont: { family: 'Inter' }
          }
        }
      }
    });
    setRef(chart);
  }

  function renderCategoriaDetalhe(boxId, agrupado, lancamentos, tipo) {
    const box = $('#' + boxId);
    if (!agrupado || agrupado.length === 0) { box.innerHTML = ''; return; }

    const dotClass = tipo === 'Entrada' ? 'cat-item__dot--entrada' : 'cat-item__dot--saida';
    const totalClass = tipo === 'Entrada' ? 'cat-item__total--entrada' : 'cat-item__total--saida';
    const corValor = tipo === 'Entrada' ? 'cat-row__valor' : 'cat-row__valor';

    box.innerHTML = '<ul class="cat-list">' + agrupado.map(g => {
      const linhas = lancamentos.filter(l => l.tipo === tipo && l.categoria === g.categoria);
      return (
        '<li>' +
          '<details class="cat-item">' +
            '<summary class="cat-item__head">' +
              '<span class="cat-item__nome">' +
                '<span class="cat-item__dot ' + dotClass + '"></span>' +
                escapeHtml(g.categoria) +
              '</span>' +
              '<span class="cat-item__right">' +
                '<span class="cat-item__pct">' + g.percentual.toFixed(0) + '%</span>' +
                '<span class="cat-item__total ' + totalClass + '">' + fmtBRL(g.total) + '</span>' +
                '<span class="cat-item__chevron">⌄</span>' +
              '</span>' +
            '</summary>' +
            '<div class="cat-item__body">' +
              linhas.map(l => (
                '<div class="cat-row">' +
                  '<span class="cat-row__data">' + escapeHtml(l.data) + '</span>' +
                  '<span class="cat-row__desc">' + escapeHtml(l.descricao || '—') + '</span>' +
                  '<span class="' + corValor + '">' + fmtBRL(l.valor) + '</span>' +
                '</div>'
              )).join('') +
            '</div>' +
          '</details>' +
        '</li>'
      );
    }).join('') + '</ul>';
  }

  function renderAvisos(avisos) {
    const box = $('#avisos-list');
    const sec = $('#sec-avisos');
    if (!avisos || avisos.length === 0) {
      sec.style.display = 'none';
      return;
    }
    sec.style.display = '';
    box.innerHTML = avisos.map(a => (
      '<div class="aviso' + (a.fixado ? ' aviso--fixado' : '') + '">' +
        '<div class="aviso__head">' +
          '<h3 class="aviso__titulo">' + escapeHtml(a.titulo) + '</h3>' +
          (a.fixado ? '<span class="aviso__pin">📌 fixado</span>' : '') +
          '<span class="aviso__data">' + escapeHtml(a.data) + '</span>' +
        '</div>' +
        (a.mensagem ? '<p class="aviso__msg">' + escapeHtml(a.mensagem) + '</p>' : '') +
      '</div>'
    )).join('');
  }

  function renderExtrato(lancamentos) {
    const box = $('#extrato');
    const filtrados = filtroAtual === 'todos'
      ? lancamentos
      : lancamentos.filter(l => l.tipo === filtroAtual);

    if (filtrados.length === 0) {
      box.innerHTML = '<div class="extrato__vazio">Nenhum lançamento ' +
        (filtroAtual === 'todos' ? 'registrado.' : 'desse tipo.') + '</div>';
      return;
    }

    // ordena: data desc
    const sorted = filtrados.slice().sort((a, b) => (b.data || '').localeCompare(a.data || ''));

    box.innerHTML = sorted.map(l => {
      const sinal = l.tipo === 'Entrada' ? '+' : '−';
      const cls = l.tipo === 'Entrada' ? 'extrato__valor--entrada' : 'extrato__valor--saida';
      return (
        '<div class="extrato__linha">' +
          '<span class="extrato__data">' + escapeHtml(l.data) + '</span>' +
          '<span class="extrato__desc">' +
            '<span class="extrato__cat">' + escapeHtml(l.categoria) + '</span>' +
            '<span class="extrato__txt">' + escapeHtml(l.descricao || '—') + '</span>' +
          '</span>' +
          '<span class="extrato__valor ' + cls + '">' + sinal + ' ' + fmtBRL(l.valor) + '</span>' +
        '</div>'
      );
    }).join('');
  }

  function renderAll(data) {
    dadosAtuais = data;
    if (data.erro) {
      renderWarnings(null, data.erro);
      return;
    }
    renderWarnings(data.warnings);
    if (data.config && data.config.nome_turma) {
      $('#badge-turma').textContent = data.config.nome_turma;
    }
    renderMeta(data.resumo);
    renderCards(data.resumo);
    renderCharts(data.porCategoriaEntrada, data.porCategoriaSaida);
    renderCategoriaDetalhe('cat-detalhe-entrada', data.porCategoriaEntrada, data.lancamentos, 'Entrada');
    renderCategoriaDetalhe('cat-detalhe-saida',   data.porCategoriaSaida,   data.lancamentos, 'Saida');
    renderAvisos(data.avisos);
    renderExtrato(data.lancamentos);
    atualizarHorario(data.ultimaLeitura);
  }

  function atualizarHorario(iso) {
    const d = iso ? new Date(iso) : new Date();
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    $('#ultima-leitura').textContent = hh + ':' + mm;
  }

  function bindFiltros() {
    $$('.pill[data-filtro]').forEach(btn => {
      btn.addEventListener('click', () => {
        $$('.pill[data-filtro]').forEach(b => b.classList.remove('pill--active'));
        btn.classList.add('pill--active');
        filtroAtual = btn.dataset.filtro;
        if (dadosAtuais) renderExtrato(dadosAtuais.lancamentos);
      });
    });
  }

  function bindRefresh() {
    const btn = $('#btn-refresh');
    const txt = $('#btn-refresh-txt');
    btn.addEventListener('click', () => {
      btn.disabled = true;
      txt.textContent = 'atualizando…';
      google.script.run
        .withSuccessHandler((resp) => {
          btn.disabled = false;
          txt.textContent = '↻ Atualizar';
          if (resp && resp.ok) {
            renderAll(resp.data);
            showToast('Atualizado às ' + new Date().toLocaleTimeString('pt-BR').slice(0, 5), 'sucesso');
          } else {
            showToast(resp && resp.erro ? resp.erro : 'Falha ao atualizar', 'erro');
          }
        })
        .withFailureHandler((err) => {
          btn.disabled = false;
          txt.textContent = '↻ Atualizar';
          showToast('Falha ao atualizar', 'erro');
        })
        .getDashboardData();
    });
  }

  function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // Boot
  document.addEventListener('DOMContentLoaded', () => {
    bindFiltros();
    bindRefresh();
    if (window.__INITIAL__) renderAll(window.__INITIAL__);
  });
})();
</script>
